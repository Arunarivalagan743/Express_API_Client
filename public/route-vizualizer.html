<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express API Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        .api-visualizer {
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 30px;
        }
        .route-container {
            margin-bottom: 30px;
        }
        .route-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 6px;
            background-color: #eee;
        }
        .method {
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 10px;
            min-width: 60px;
            text-align: center;
            color: white;
        }
        .get { background-color: #3498db; }
        .post { background-color: #2ecc71; }
        .put { background-color: #f39c12; }
        .delete { background-color: #e74c3c; }
        .options { background-color: #9b59b6; }
        
        .path {
            font-family: monospace;
            font-size: 16px;
            flex-grow: 1;
        }
        .description {
            color: #666;
            margin-left: 15px;
            font-style: italic;
        }
        .route-tester {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
        }
        .param-input {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .param-input label {
            min-width: 120px;
            font-weight: bold;
        }
        .param-input input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .test-button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .test-button:hover {
            background-color: #2980b9;
        }
        .response-container {
            margin-top: 15px;
        }
        .response-header {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .response-body {
            background-color: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 12px;
            font-family: monospace;
            white-space: pre-wrap;
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
        }
        .toggle-details {
            background-color: #eee;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }
        .route-details {
            margin-top: 10px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 4px;
            display: none;
        }
        .show-details {
            display: block;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background-color: #34495e;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .status-code {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 14px;
            font-weight: bold;
            margin-right: 10px;
        }
        .status-success {
            background-color: #dff0d8;
            color: #3c763d;
        }
        .status-error {
            background-color: #f2dede;
            color: #a94442;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Back to Main App</a>
    <h1>Express API Route Visualizer</h1>
    
    <div class="api-visualizer" id="apiVisualizer">
        <!-- Routes will be rendered here dynamically -->
        <div class="loading">Loading API routes...</div>
    </div>

    <script>
        // Route definitions
        const routes = [
            { 
                method: 'GET', 
                path: 'https://express-api-client.onrender.com/api/users', 
                description: 'Get all users',
                responseExample: [
                    { id: 1, name: 'John Doe', email: 'john@example.com' },
                    { id: 2, name: 'Jane Smith', email: 'jane@example.com' }
                ],
                testInputs: []
            },
            { 
                method: 'GET', 
                path: 'https://express-api-client.onrender.com/api/users/:id', 
                description: 'Get a specific user by ID',
                responseExample: { id: 1, name: 'John Doe', email: 'john@example.com' },
                testInputs: [
                    { name: 'id', type: 'number', placeholder: 'User ID', required: true }
                ]
            },
            { 
                method: 'POST', 
                path: 'https://express-api-client.onrender.com/api/users', 
                description: 'Create a new user',
                requestExample: { name: 'New User', email: 'new@example.com' },
                responseExample: { id: 4, name: 'New User', email: 'new@example.com' },
                testInputs: [
                    { name: 'name', type: 'text', placeholder: 'User Name', required: true },
                    { name: 'email', type: 'email', placeholder: 'Email Address', required: true }
                ]
            },
            { 
                method: 'PUT', 
                path: 'https://express-api-client.onrender.com/api/users/:id', 
                description: 'Update an existing user',
                requestExample: { name: 'Updated Name', email: 'updated@example.com' },
                responseExample: { id: 1, name: 'Updated Name', email: 'updated@example.com' },
                testInputs: [
                    { name: 'id', type: 'number', placeholder: 'User ID', required: true },
                    { name: 'name', type: 'text', placeholder: 'New Name', required: false },
                    { name: 'email', type: 'email', placeholder: 'New Email', required: false }
                ]
            },
            { 
                method: 'DELETE', 
                path: 'https://express-api-client.onrender.com/api/users/:id', 
                description: 'Delete a user',
                responseExample: { message: 'User deleted', user: { id: 1, name: 'John Doe', email: 'john@example.com' } },
                testInputs: [
                    { name: 'id', type: 'number', placeholder: 'User ID', required: true }
                ]
            },
            { 
                method: 'GET', 
                path: 'https://express-api-client.onrender.com/api/test', 
                description: 'Test if API is working',
                responseExample: { message: 'API is working!' },
                testInputs: []
            }
        ];

        // Function to render the routes
        function renderRoutes() {
            const container = document.getElementById('apiVisualizer');
            container.innerHTML = ''; // Clear loading message

            routes.forEach(route => {
                const routeElement = document.createElement('div');
                routeElement.className = 'route-container';
                
                // Create route header
                const routeHeader = document.createElement('div');
                routeHeader.className = 'route-header';
                
                const methodSpan = document.createElement('span');
                methodSpan.className = `method ${route.method.toLowerCase()}`;
                methodSpan.textContent = route.method;
                
                const pathSpan = document.createElement('span');
                pathSpan.className = 'path';
                pathSpan.textContent = route.path;
                
                const descSpan = document.createElement('span');
                descSpan.className = 'description';
                descSpan.textContent = route.description;
                
                const toggleButton = document.createElement('button');
                toggleButton.className = 'toggle-details';
                toggleButton.textContent = 'Show Details';
                toggleButton.onclick = function() {
                    const details = this.parentNode.nextElementSibling;
                    if (details.classList.contains('show-details')) {
                        details.classList.remove('show-details');
                        this.textContent = 'Show Details';
                    } else {
                        details.classList.add('show-details');
                        this.textContent = 'Hide Details';
                    }
                };
                
                routeHeader.appendChild(methodSpan);
                routeHeader.appendChild(pathSpan);
                routeHeader.appendChild(descSpan);
                routeHeader.appendChild(toggleButton);
                
                // Create route details
                const routeDetails = document.createElement('div');
                routeDetails.className = 'route-details';
                
                // Create route tester
                const routeTester = document.createElement('div');
                routeTester.className = 'route-tester';
                
                // Create form for inputs
                const form = document.createElement('form');
                form.onsubmit = function(e) {
                    e.preventDefault();
                    testRoute(route, this, routeDetails);
                };
                
                // Add inputs based on route definition
                route.testInputs.forEach(input => {
                    const inputDiv = document.createElement('div');
                    inputDiv.className = 'param-input';
                    
                    const label = document.createElement('label');
                    label.textContent = input.name;
                    label.setAttribute('for', `${route.method}-${route.path}-${input.name}`);
                    
                    const inputElement = document.createElement('input');
                    inputElement.id = `${route.method}-${route.path}-${input.name}`;
                    inputElement.type = input.type;
                    inputElement.name = input.name;
                    inputElement.placeholder = input.placeholder;
                    if (input.required) inputElement.required = true;
                    
                    inputDiv.appendChild(label);
                    inputDiv.appendChild(inputElement);
                    form.appendChild(inputDiv);
                });
                
                // Add test button
                const testButton = document.createElement('button');
                testButton.className = 'test-button';
                testButton.type = 'submit';
                testButton.textContent = `Test ${route.method} Request`;
                form.appendChild(testButton);
                
                // Create response container
                const responseContainer = document.createElement('div');
                responseContainer.className = 'response-container';
                responseContainer.innerHTML = `
                    <div class="response-header">Expected Response:</div>
                    <pre class="response-body">${JSON.stringify(route.responseExample, null, 2)}</pre>
                    <div class="response-header" style="margin-top: 15px;">Actual Response:</div>
                    <div class="status-code"></div>
                    <pre class="response-body actual-response">Response will appear here after testing</pre>
                `;
                
                routeTester.appendChild(form);
                routeTester.appendChild(responseContainer);
                routeDetails.appendChild(routeTester);
                
                routeElement.appendChild(routeHeader);
                routeElement.appendChild(routeDetails);
                container.appendChild(routeElement);
            });
        }

        // Function to test a route
        async function testRoute(route, form, detailsContainer) {
            const method = route.method;
            let url = route.path;
            let body = {};
            
            // Process form data
            const formData = new FormData(form);
            for (const [key, value] of formData.entries()) {
                // For path parameters, replace in URL
                if (url.includes(`:${key}`)) {
                    url = url.replace(`:${key}`, value);
                } else if (method !== 'GET') {
                    // For request body (non-GET requests)
                    body[key] = value;
                }
            }
            
            // Replace API base URL if needed
            url = url.replace(/^\/api/, '/api');
            
            // Show response is loading
            const responseEl = detailsContainer.querySelector('.actual-response');
            const statusEl = detailsContainer.querySelector('.status-code');
            responseEl.textContent = 'Loading...';
            statusEl.textContent = '';
            
            try {
                // Configure request options
                const options = {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    }
                };
                
                // Add body for non-GET requests
                if (method !== 'GET' && Object.keys(body).length > 0) {
                    options.body = JSON.stringify(body);
                }
                
                // Send request
                const response = await fetch(url, options);
                const responseData = await response.json();
                
                // Update status and response
                statusEl.textContent = `Status: ${response.status} ${response.statusText}`;
                statusEl.className = `status-code ${response.ok ? 'status-success' : 'status-error'}`;
                responseEl.textContent = JSON.stringify(responseData, null, 2);
            } catch (error) {
                statusEl.textContent = 'Error';
                statusEl.className = 'status-code status-error';
                responseEl.textContent = `Error: ${error.message}`;
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', renderRoutes);
    </script>
</body>
</html>
